<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurasia Paper Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 60px 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .cover-item {
            margin-bottom: 80px;
        }

        .cover-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* 모바일 */
        @media (max-width: 767px) {
            body {
                padding: 20px 0;
            }

            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            .cover-item {
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover-item">
            <img src="/assets/images/covers/test1.png" alt="Interview 1" class="cover-image">
        </div>
        <div class="cover-item">
            <img src="/assets/images/covers/test2.png" alt="Interview 2" class="cover-image">
        </div>
        <div class="cover-item">
            <img src="/assets/images/covers/test3.png" alt="Interview 3" class="cover-image">
        </div>
    </div>
</body>
</html>
