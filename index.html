<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurasia Paper Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            gap: 60px;
        }

        .cover-section {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover-image {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .content-section {
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover-section">
            <img src="/assets/images/covers/test1.png" alt="Interview Cover" class="cover-image">
        </div>
        <div class="content-section">
            <!-- 여기에 나중에 콘텐츠 추가 -->
        </div>
    </div>
</body>
</html>
