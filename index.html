<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurasia Paper Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .coverflow-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        .coverflow {
            display: flex;
            gap: 0;
            position: relative;
            height: 500px;
            width: 100%;
        }

        .cover {
            width: 300px;
            height: 400px;
            position: absolute;
            transition: all 0.4s ease-out;
            cursor: pointer;
            left: 50%;
            transform-origin: center;
            will-change: transform, opacity;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .cover[data-position="0"] {
            transform: translateX(-50%) translateZ(0) scale(1.2);
            z-index: 10;
            opacity: 1;
        }

        .cover[data-position="-1"],
        .cover[data-position="1"] {
            z-index: 9;
            opacity: 0.7;
        }

        .cover[data-position="-1"] {
            transform: translateX(-120%) translateZ(-200px) rotateY(35deg) scale(0.85);
        }

        .cover[data-position="1"] {
            transform: translateX(20%) translateZ(-200px) rotateY(-35deg) scale(0.85);
        }

        .cover[data-position="-2"],
        .cover[data-position="2"] {
            z-index: 8;
            opacity: 0.5;
        }

        .cover[data-position="-2"] {
            transform: translateX(-190%) translateZ(-400px) rotateY(45deg) scale(0.7);
        }

        .cover[data-position="2"] {
            transform: translateX(90%) translateZ(-400px) rotateY(-45deg) scale(0.7);
        }
    </style>
</head>
<body>
    <div class="coverflow-container">
        <div class="coverflow" id="coverflow"></div>
    </div>

    <script>
        const images = [
            '/assets/images/covers/test1.png',
            '/assets/images/covers/test2.png',
            '/assets/images/covers/test3.png'
        ];

        const coverflow = document.getElementById('coverflow');
        let currentIndex = 0;
        const totalImages = images.length;

        function createCovers() {
            // 좌우 2개씩 + 중앙 1개 = 총 5개
            for (let i = -2; i <= 2; i++) {
                const cover = document.createElement('div');
                cover.className = 'cover';
                cover.innerHTML = `<img src="${images[mod(currentIndex + i, totalImages)]}" alt="Interview ${mod(currentIndex + i, totalImages) + 1}">`;
                cover.setAttribute('data-offset', i);
                cover.setAttribute('data-position', i);
                
                cover.addEventListener('mouseenter', () => {
                    const offset = parseInt(cover.getAttribute('data-offset'));
                    if (offset !== 0) {
                        currentIndex = mod(currentIndex + offset, totalImages);
                        updateCoverflow();
                    }
                });
                
                coverflow.appendChild(cover);
            }
        }

        function mod(n, m) {
            return ((n % m) + m) % m;
        }

        function updateCoverflow() {
            const covers = coverflow.querySelectorAll('.cover');
            
            covers.forEach((cover, idx) => {
                const offset = idx - 2; // -2, -1, 0, 1, 2
                const imageIndex = mod(currentIndex + offset, totalImages);
                
                cover.querySelector('img').src = images[imageIndex];
                cover.setAttribute('data-position', offset);
            });
        }

        createCovers();
    </script>
</body>
</html>
