<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurasia Paper Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 30px 0;
            color: #000;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .article {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 20px;
            padding: 30px 0;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        .date {
            font-size: 8pt;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .title {
            font-size: 16pt;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .description {
            font-size: 10pt;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .cover-image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 모바일 */
        @media (max-width: 767px) {
            body {
                padding: 20px 0;
            }

            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            .article {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .title {
                font-size: 20pt;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/2026/03/17/Kasseta.html">
            <article class="article">
                <div class="date">
                    3 DAYS<br>AGO
                </div>
                <div class="content">
                    <h1 class="title">Kasseta</h1>
                    <p class="description">
                        눌려있던 녹음 버튼이 튀어 오르고, 소년은 카세트를 꺼내 친구 집으로 간다. 재생 버튼을 누르고 스풀이 돌아가면, 둔탁한 리듬과 소년의 목소리가 작은 방을 채운다.
                    </p>
                    <img src="/assets/images/covers/kasseta1.png" alt="Kasseta" class="cover-image">
                </div>
            </article>
        </a>
    </div>
</body>
</html>
