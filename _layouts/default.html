<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Eurasia Paper Magazine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 30px 0;
            color: #000;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 24pt;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 10pt;
            margin-bottom: 15px;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }

        /* 모바일 */
        @media (max-width: 767px) {
            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            h1 {
                font-size: 20pt;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
