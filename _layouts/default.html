<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Eurasia Paper Magazine</title>
    <link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: 'Spoqa Han Sans Neo', 'Times New Roman', Times, serif;
            padding: 30px 0;
            color: #000;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24pt;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 10pt;
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            height: auto;
            margin: 20px 0;
            display: block;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 30px 0;
        }

        /* 세로 전광판 홈버튼 */
        .home-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 11pt;
            font-weight: normal;
            letter-spacing: -0.5px;
            white-space: nowrap;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            text-shadow: 0.5px 0 0 black, -0.5px 0 0 black, 0 0.5px 0 black, 0 -0.5px 0 black;
        }

        .home-logo-scroll {
            display: inline-block;
            animation: scrollVertical 15s linear infinite;
        }

        @keyframes scrollVertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* 모바일 */
        @media (max-width: 767px) {
            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            h1 {
                font-size: 20pt;
            }

            .home-logo {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 9pt;
                font-weight: normal;
                letter-spacing: -0.5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>

    <script>
        // 첫 번째 이미지 찾기
        const firstImage = document.querySelector('.container img:first-of-type');
        
        if (firstImage) {
            // 이미지를 감싸는 wrapper 생성
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-block';
            wrapper.style.width = '100%';
            
            // 이미지를 wrapper로 감싸기
            firstImage.parentNode.insertBefore(wrapper, firstImage);
            wrapper.appendChild(firstImage);
            
            // 홈버튼 생성
            const homeButton = document.createElement('a');
            homeButton.href = '/';
            homeButton.style.position = 'absolute';
            homeButton.style.left = '-20px';
            homeButton.style.top = '0';
            homeButton.style.width = '20px';
            homeButton.style.overflow = 'hidden';
            homeButton.style.cursor = 'pointer';
            homeButton.style.textDecoration = 'none';
            homeButton.style.color = 'inherit';
            
            homeButton.innerHTML = `
                <div class="home-logo">
                    <span class="home-logo-scroll">
                        Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;
                    </span>
                </div>
            `;
            
            // wrapper에 버튼 추가
            wrapper.appendChild(homeButton);
            
            // 높이 설정 (이미지의 절반)
            const setHeight = () => {
                homeButton.style.height = (firstImage.offsetHeight / 2) + 'px';
            };
            
            setHeight();
            firstImage.addEventListener('load', setHeight);
            window.addEventListener('resize', setHeight);
            
            // hover 효과
            homeButton.addEventListener('mouseenter', function() {
                this.style.opacity = '0.6';
            });
            homeButton.addEventListener('mouseleave', function() {
                this.style.opacity = '1';
            });
        }
    </script>
</body>
</html>
