<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Eurasia Paper Magazine</title>
    <link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Aboreto&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: 'Spoqa Han Sans Neo', 'Times New Roman', Times, serif;
            padding: 30px 0;
            color: #000;
            line-height: 1.6;
            position: relative;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24pt;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 10pt;
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            height: auto;
            margin: 20px 0;
            display: block;
        }

        img:first-of-type {
            position: relative;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 30px 0;
        }

        /* 세로 전광판 홈버튼 */
        .home-button {
            position: absolute;
            left: calc((100vw - 500px) / 2 - 42px);
            width: 40px;
            overflow: hidden;
            cursor: pointer;
            z-index: 100;
        }

        .home-logo {
            font-family: 'Herculanum', Georgia, 'Times New Roman', serif;
            font-size: 11pt;
            font-weight: bold;
            white-space: nowrap;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            text-shadow: 0.5px 0 0 black, -0.5px 0 0 black, 0 0.5px 0 black, 0 -0.5px 0 black;
        }

        .home-logo-scroll {
            display: inline-block;
            animation: scrollVertical 15s linear infinite;
        }

        @keyframes scrollVertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .home-button:hover {
            opacity: 0.6;
        }

        /* 모바일 */
        @media (max-width: 767px) {
            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            h1 {
                font-size: 20pt;
            }

            .home-button {
                left: 10px;
                top: 20px;
                position: fixed;
            }

            .home-logo {
                font-family: 'Aboreto', sans-serif;
                font-size: 9pt;
                letter-spacing: -0.5px;
            }
        }

        @media (min-width: 768px) and (max-width: 1100px) {
            .home-button {
                left: 20px;
                position: fixed;
                top: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>

    <script>
        // 첫 번째 이미지 찾기
        const firstImage = document.querySelector('.container img:first-of-type');
        if (firstImage && window.innerWidth > 767) {
            // 홈버튼 생성
            const homeButton = document.createElement('a');
            homeButton.href = '/';
            homeButton.innerHTML = `
                <div class="home-button">
                    <div class="home-logo">
                        <span class="home-logo-scroll">
                            Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;
                        </span>
                    </div>
                </div>
            `;
            
            // 이미지 부모에 추가
            firstImage.parentElement.style.position = 'relative';
            firstImage.parentElement.insertBefore(homeButton, firstImage);
            
            // 이미지 위치 기준으로 홈버튼 배치
            const button = homeButton.querySelector('.home-button');
            const imageRect = firstImage.getBoundingClientRect();
            const containerRect = firstImage.parentElement.getBoundingClientRect();
            
            button.style.top = (firstImage.offsetTop) + 'px';
            button.style.height = firstImage.offsetHeight + 'px';
        } else if (window.innerWidth <= 767) {
            // 모바일: fixed 홈버튼
            const homeButton = document.createElement('a');
            homeButton.href = '/';
            homeButton.innerHTML = `
                <div class="home-button">
                    <div class="home-logo">
                        <span class="home-logo-scroll">
                            Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;Eurasia Paper Magazine&nbsp;&nbsp;&nbsp;&nbsp;
                        </span>
                    </div>
                </div>
            `;
            document.body.insertBefore(homeButton, document.body.firstChild);
        }
    </script>
</body>
</html>
