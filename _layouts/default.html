<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Eurasia Paper Magazine</title>
    <link href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css" rel="stylesheet" type="text/css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            font-family: 'Spoqa Han Sans Neo', -apple-system, sans-serif;
            padding: 30px 0;
            color: #000;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 24pt;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 10pt;
            margin-bottom: 15px;
        }

        /* 영어/러시아어만 Times */
        p:lang(en), p:lang(ru), em:lang(en), em:lang(ru), strong:lang(en), strong:lang(ru) {
            font-family: 'Times New Roman', Times, serif;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 30px 0;
        }

        /* 모바일 */
        @media (max-width: 767px) {
            .container {
                max-width: 320px;
                padding: 0 10px;
            }

            h1 {
                font-size: 20pt;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
